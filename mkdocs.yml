site_name: indexnow
site_description: IndexNow protocol CLI client for content pipelines — submit URL changes to Bing, Yandex, Naver, Seznam, Yep, and the shared IndexNow API.
site_url: https://jtprogru.github.io/indexnow/
repo_url: https://github.com/jtprogru/indexnow
repo_name: jtprogru/indexnow
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ru
          name: Русский
          build: true
          nav_translations:
            Home: Главная
            Getting started: Старт
            GitHub Action: GitHub Action
            CLI: CLI
            Overview: Обзор
            Commands: Команды
            Guides: Руководства
            Endpoints: Эндпоинты
            Configuration: Конфигурация
            Architecture: Архитектура
            Contributing: Контрибьютинг

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - GitHub Action: guides/github-action.md
  - CLI:
      - Overview: commands/index.md
      - indexnow submit: commands/submit.md
      - indexnow verify: commands/verify.md
  - Guides:
      - Endpoints: guides/endpoints.md
      - Configuration: guides/configuration.md
  - Architecture: architecture.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jtprogru/indexnow
  version:
    provider: mike
