# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: "3"

vars:
  BINARY_NAME: indexnow
  MAIN_PKG: ./cmd/indexnow
  GOPATH:
    sh: echo $GOPATH

tasks:
  default:
    cmds: [task --list]
    silent: true

  run:
    desc: Run via go run
    cmds: ["go run {{ .MAIN_PKG }} {{ .CLI_ARGS }}"]

  tidy:
    cmds: ["go mod tidy"]

  build:
    desc: Build binary into ./dist
    cmds:
      - "go mod download"
      - "CGO_ENABLED=0 go build -o ./dist/{{ .BINARY_NAME }} {{ .MAIN_PKG }}"

  fmt:
    cmds: ["gofmt -s -w ."]

  vet:
    cmds: ["go vet ./..."]

  test:
    desc: Run unit tests with coverage
    cmds: ["go test --short -coverprofile=cover.out -v ./..."]

  test:race:
    desc: Run tests with the race detector (matches CI)
    cmds: ["go test -race -v ./..."]

  lint:
    desc: Run golangci-lint
    cmds: ["golangci-lint -v run"]

  ci:
    desc: Run everything CI runs (lint + race tests). Quick local pre-push check.
    cmds:
      - task: lint
      - task: test:race

  release:dry:
    desc: Goreleaser dry-run (no publish; binaries land in ./dist)
    cmds: ["goreleaser release --clean --snapshot --skip=publish,sign"]

  docs:install:
    desc: Install MkDocs + plugins into the current Python env
    cmds: ["pip install -r docs/requirements.txt"]

  docs:serve:
    desc: Serve the docs site locally at http://127.0.0.1:8000
    cmds: ["mkdocs serve"]

  docs:build:
    desc: Build the docs site to ./site (no deploy)
    cmds: ["mkdocs build --strict"]

  install:
    cmds: ["go install {{ .MAIN_PKG }}"]
