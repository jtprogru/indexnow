name: action-smoke

on:
  pull_request:
    paths:
      - "action.yml"
      - "scripts/**"
      - ".github/workflows/action-smoke.yaml"
  push:
    branches:
      - main
    paths:
      - "action.yml"
      - "scripts/**"
      - ".github/workflows/action-smoke.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Use indexnow Action (dry-run, urls input)
        uses: ./
        with:
          version: "latest"
          key: "abcdef0123456789abcdef0123456789"
          host: "example.com"
          urls: |
            https://example.com/a
            https://example.com/b
          dry-run: "true"

      - name: Use indexnow Action (dry-run, sitemap input — local file)
        uses: ./
        with:
          version: "latest"
          key: "abcdef0123456789abcdef0123456789"
          host: "example.com"
          sitemap: ${{ github.workspace }}/.github/fixtures/sitemap.xml
          dry-run: "true"

      - name: Use indexnow Action (dry-run, urls-from with output)
        uses: ./
        with:
          version: "latest"
          key: "abcdef0123456789abcdef0123456789"
          host: "example.com"
          urls-from: |
            printf '%s\n' \
              https://example.com/a \
              '# comment lines are ignored' \
              https://example.com/b
          dry-run: "true"

      - name: Use indexnow Action (urls-from empty — exit 0, submit skipped)
        id: empty
        uses: ./
        with:
          version: "latest"
          key: "abcdef0123456789abcdef0123456789"
          host: "example.com"
          urls-from: "true"
          dry-run: "true"

      - name: Assert empty urls-from produced submitted-count=0
        run: |
          if [[ "${{ steps.empty.outputs.submitted-count }}" != "0" ]]; then
            echo "expected submitted-count=0, got '${{ steps.empty.outputs.submitted-count }}'"
            exit 1
          fi
          if [[ "${{ steps.empty.outputs.exit-code }}" != "0" ]]; then
            echo "expected exit-code=0, got '${{ steps.empty.outputs.exit-code }}'"
            exit 1
          fi

      - name: Use indexnow Action (urls-from script fails — step fails)
        id: failing
        continue-on-error: true
        uses: ./
        with:
          version: "latest"
          key: "abcdef0123456789abcdef0123456789"
          host: "example.com"
          urls-from: "echo 'simulated failure' >&2; exit 7"
          dry-run: "true"

      - name: Assert failing urls-from caused step failure
        run: |
          if [[ "${{ steps.failing.outcome }}" != "failure" ]]; then
            echo "expected previous step to fail; outcome was '${{ steps.failing.outcome }}'"
            exit 1
          fi

      - name: Assert cache hit on subsequent uses
        run: |
          echo "If we got here, all uses of the action shared the same version-arch cache key."
